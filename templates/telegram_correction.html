<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Correct Receipt</title>

    <!-- Telegram Web App bridge -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>


    <style>
        :root {
            color-scheme: light dark;
            --bs-body-font-size: 17px;
            --bs-border-radius: 12px;
            --bs-spacer: 1rem;
            --bs-secondary-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
            --bs-text: var(--tg-theme-text-color, #222);
        }

        body {
            margin: 0;
            padding: 12px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--bs-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: var(--bs-body-font-size);
            line-height: 1.5;
        }

        h2 { 
            margin: 0 0 calc(var(--bs-spacer) * 1.25); 
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }
        
        .row { display: flex; flex-wrap: wrap; margin: 0 -6px; }
        .col { flex: 1 0 0%; padding: 0 6px; min-width: 0; }
        .mb-3 { margin-bottom: 14px; position: relative; }
        
        .form-check {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .form-check-input {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            margin-top: 0;
            cursor: pointer;
            accent-color: var(--tg-theme-button-color, #2ea6ff);
        }
        
        .form-check-label {
            cursor: pointer;
            font-size: 16px;
        }

        .split-container {
            display: flex;
            align-items: center;
            background-color: var(--bs-secondary-bg);
            border-radius: var(--bs-border-radius);
            padding: 4px 12px;
            margin-top: 8px;
            margin-left: 30px;
        }

        .split-container .prefix {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999);
            margin-right: 8px;
            white-space: nowrap;
        }

        .split-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 16px;
            color: var(--bs-text);
            outline: none;
            min-width: 0;
        }

        .split-container .suffix {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999);
            margin-left: 8px;
        }

        .selector-group {
            display: flex;
            background: var(--bs-secondary-bg);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
        }

        .selector-item {
            flex: 1;
            text-align: center;
            padding: 10px 4px;
            border-radius: 9px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--tg-theme-text-color, #000);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .selector-item.active {
            background: var(--tg-theme-button-color, #2ea6ff);
            color: var(--tg-theme-button-text-color, #fff);
        }

        .clear-btn {
            position: absolute;
            top: 36px;
            right: 8px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.1);
            color: var(--tg-theme-hint-color, #999);
            border-radius: 50%;
            cursor: pointer;
            z-index: 2;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .clear-btn:active { opacity: 0.6; }

        @media (prefers-color-scheme: dark) {
            .clear-btn { background: rgba(255,255,255,0.1); }
        }
        
        .form-label { 
            display: inline-block;
            margin-bottom: 0.25rem;
            color: var(--tg-theme-hint-color, #999); 
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .form-control, .form-select {
            display: block;
            width: 100%;
            padding: 12px 14px;
            font-size: inherit;
            color: var(--bs-text);
            background-color: var(--bs-secondary-bg);
            border: 1px solid transparent;
            border-radius: var(--bs-border-radius);
            box-sizing: border-box;
            appearance: none;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--tg-theme-button-color, #2ea6ff);
            outline: 0;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px 20px;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-sizing: border-box;
        }

        .btn-primary {
            color: var(--tg-theme-button-text-color, #fff);
            background-color: var(--tg-theme-button-color, #2ea6ff);
        }

        .btn-secondary {
            color: var(--tg-theme-button-color, #2ea6ff);
            background-color: var(--bs-secondary-bg);
        }
        
        .d-none { display: none !important; }

        @media (prefers-color-scheme: dark) {
            body:not([data-tg-theme]) { background: #0e1621; color: #e6eaf0; }
            .form-control:not([data-tg-theme]), .form-select:not([data-tg-theme]) {
                background-color: #17212b; color: #e6eaf0;
            }
        }
    </style>
</head>
<body>
<div id="form-fallback">
    <div class="mb-3">
        <label for="merchant" class="form-label">Merchant</label>
        <input id="merchant" class="form-control" type="text" placeholder="Store name"/>
    </div>

    <div class="row mb-3">
        <div class="col">
            <label for="total" class="form-label">Total</label>
            <input id="total" class="form-control" type="text" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" oninput="this.value = this.value.replace(',', '.')" placeholder="0.00"/>
        </div>
        <div class="col">
            <label for="currency_code" class="form-label">Currency</label>
            <input id="currency_code" class="form-control" type="text" maxlength="3" placeholder="EUR"/>
        </div>
    </div>

    <div class="mb-3">
        <label for="date" class="form-label">Date</label>
        <input id="date" class="form-control" type="datetime-local"/>
    </div>

    <div class="mb-3">
        <label for="category" class="form-label">Category</label>
        <select id="category" class="form-select">
            <option value="" selected disabled>Select category</option>
        </select>
    </div>

    <div class="mb-3">
        <label for="notes" class="form-label">Notes (optional)</label>
        <div id="clearNotes" class="clear-btn d-none">&times;</div>
        <textarea id="notes" class="form-control" rows="2" placeholder="Any details"></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Who paid?</label>
        <div id="whoPaidSelector" class="selector-group">
            <!-- Populated via JS -->
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">How it's shared?</label>
        <div id="shareTypeSelector" class="selector-group mb-2">
            <div class="selector-item active" data-value="equal">Equally</div>
            <div class="selector-item" data-value="amount">Your share (Amt)</div>
            <div class="selector-item" data-value="percentage">Your share (%)</div>
        </div>
        
        <div id="shareAmountContainer" class="split-container d-none">
            <span class="prefix">You owe</span>
            <input type="text" id="myShareAmount" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" oninput="this.value = this.value.replace(',', '.')" placeholder="0.00">
            <span class="suffix cur-addon">EUR</span>
        </div>
        
        <div id="sharePercentageContainer" class="split-container d-none">
            <span class="prefix">You owe</span>
            <input type="text" id="mySharePercentage" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" oninput="this.value = this.value.replace(',', '.')" placeholder="50">
            <span class="suffix">%</span>
        </div>
    </div>

    <button class="btn btn-primary mb-3 d-none" id="submitBtn">Save and continue</button>
</div>

<script>
    const tg = window.Telegram?.WebApp;

    function applyTheme() {
        if (!tg) return;
        const root = document.documentElement;
        Object.entries(tg.themeParams).forEach(([k, v]) => {
            root.style.setProperty(`--tg-theme-${k.replace(/[A-Z]/g, m => '-' + m.toLowerCase())}`, v);
        });
    }

    function collectData() {
        const cat = document.getElementById('category');
        const totalValue = (document.getElementById('total').value || '0').replace(',', '.');
        
        const whoPaidItem = document.querySelector('#whoPaidSelector .selector-item.active');
        const shareTypeItem = document.querySelector('#shareTypeSelector .selector-item.active');
        const shareType = shareTypeItem ? shareTypeItem.dataset.value : 'equal';
        
        let shareValue = null;
        if (shareType === 'amount') {
            shareValue = (document.getElementById('myShareAmount').value || '0').replace(',', '.');
        } else if (shareType === 'percentage') {
            shareValue = (document.getElementById('mySharePercentage').value || '0').replace(',', '.');
        }

        const data = {
            merchant: document.getElementById('merchant').value?.trim() || null,
            total: totalValue,
            currency_code: document.getElementById('currency_code').value?.trim().toUpperCase() || 'EUR',
            date: document.getElementById('date').value || null,
            notes: document.getElementById('notes').value?.trim() || null,
            category: cat.selectedIndex > 0 ? cat.options[cat.selectedIndex].textContent : null,
            category_id: cat.value || null,
            split_option: 'auto',
            payer_id: whoPaidItem ? parseInt(whoPaidItem.dataset.userId) : null,
            share_type: shareType,
            share_value: shareValue,
            _source: 'telegram_web_app'
        };

        return data;
    }

    const sendData = () => {
        try { tg.sendData(JSON.stringify(collectData())); } 
        catch (e) { alert('Error sending data'); }
    };

    if (tg) {
        tg.expand();
        tg.MainButton.text = "Save and continue";
        tg.MainButton.show();
        tg.enableClosingConfirmation();
        tg.ready();
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);
        tg.MainButton.onClick(sendData);
    }

    function decodeBase64UrlUtf8(value) {
        if (!value) return '';
        const normalized = value.replace(/-/g, '+').replace(/_/g, '/');
        const padded = normalized.padEnd(normalized.length + (4 - normalized.length % 4) % 4, '=');
        const binary = atob(padded);
        const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
        return new TextDecoder('utf-8').decode(bytes);
    }

    const params = new URLSearchParams(window.location.search);
    const initial = params.get('data') ? JSON.parse(decodeBase64UrlUtf8(params.get('data'))) : {};

    async function init() {
        const select = document.getElementById('category');
        const currencyInput = document.getElementById('currency_code');
        
        const updateCur = () => {
            const cur = currencyInput.value?.trim().toUpperCase() || 'EUR';
            document.querySelectorAll('.cur-addon').forEach(el => el.textContent = cur);
        };
        const totalInput = document.getElementById('total');
        totalInput.oninput = (e) => {
            e.target.value = e.target.value.replace(',', '.');
            const activeShareType = document.querySelector('#shareTypeSelector .selector-item.active').dataset.value;
            if (activeShareType === 'percentage') syncShare('percentage');
            else if (activeShareType === 'amount') syncShare('amount');
        };
        
        currencyInput.onchange = updateCur;
        currencyInput.oninput = updateCur;

        const whoPaidContainer = document.getElementById('whoPaidSelector');
        const shareSelector = document.getElementById('shareTypeSelector');
        const members = initial.group_members || [];
        const myId = initial.current_user_id;
        
        members.forEach(member => {
            const item = document.createElement('div');
            item.className = 'selector-item';
            if (member.id == myId) {
                item.textContent = 'You';
                item.classList.add('active'); // Default
                item.dataset.userId = myId;
            } else {
                item.textContent = members.length === 2 ? 'Them' : member.name;
                item.dataset.userId = member.id;
            }
            item.onclick = () => {
                whoPaidContainer.querySelectorAll('.selector-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            };
            whoPaidContainer.appendChild(item);
        });

        const amountInput = document.getElementById('myShareAmount');
        const percentInput = document.getElementById('mySharePercentage');
        
        const syncShare = (from) => {
            const total = parseFloat(document.getElementById('total').value.replace(',', '.')) || 0;
            if (total <= 0) return;
            if (from === 'amount') {
                const amt = parseFloat(amountInput.value.replace(',', '.')) || 0;
                percentInput.value = (amt / total * 100).toFixed(1);
            } else {
                const pct = parseFloat(percentInput.value.replace(',', '.')) || 0;
                amountInput.value = (total * pct / 100).toFixed(2);
            }
        };

        shareSelector.querySelectorAll('.selector-item').forEach(item => {
            item.onclick = () => {
                shareSelector.querySelectorAll('.selector-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                const val = item.dataset.value;
                document.getElementById('shareAmountContainer').classList.toggle('d-none', val !== 'amount');
                document.getElementById('sharePercentageContainer').classList.toggle('d-none', val !== 'percentage');
            };
        });

        amountInput.addEventListener('input', (e) => { 
            e.target.value = e.target.value.replace(',', '.'); 
            syncShare('amount'); 
        });
        percentInput.addEventListener('input', (e) => { 
            e.target.value = e.target.value.replace(',', '.'); 
            syncShare('percentage'); 
        });

        try {
            const cats = await (await fetch('/categories')).json();
            cats.forEach(c => {
                const opt = new Option(c.name, c.id);
                select.add(opt);
            });
        } catch (e) {}

        document.getElementById('merchant').value = initial.merchant || '';
        document.getElementById('total').value = initial.total ?? '';
        currencyInput.value = (initial.currency_code || initial.currency || 'EUR').toUpperCase();
        updateCur();
        
        if (initial.date) {
            // We need YYYY-MM-DDTHH:MM for datetime-local input
            document.getElementById('date').value = initial.date.substring(0, 16);
        }
        
        const notesEl = document.getElementById('notes');
        notesEl.value = initial.notes || '';
        
        if (initial.category_id) {
            select.value = initial.category_id;
        } else if (initial.category) {
            // Try to match category by name
            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].textContent === initial.category) {
                    select.selectedIndex = i;
                    break;
                }
            }
        }
        
        const isEqually = initial.split_option ? (initial.split_option === 'equal') : (initial.split_equally !== false);

        if (!isEqually && initial.users && initial.users.length > 0) {
            const me = initial.users.find(u => u.user_id == myId);
            const payer = initial.users.find(u => parseFloat(u.paid_share) > 0);
            
            if (payer) {
                whoPaidContainer.querySelectorAll('.selector-item').forEach(i => {
                    if (i.dataset.userId == payer.user_id) {
                        whoPaidContainer.querySelectorAll('.selector-item').forEach(it => it.classList.remove('active'));
                        i.classList.add('active');
                    }
                });
            }

            if (me) {
                const totalVal = parseFloat(initial.total || 0);
                const myOwed = parseFloat(me.owed_share || 0);
                
                // Decide which share type to show
                if (Math.abs(myOwed - totalVal/initial.users.length) < 0.01) {
                    // It's effectively equal
                    shareSelector.querySelector('[data-value="equal"]').click();
                } else {
                    // Show as amount
                    shareSelector.querySelector('[data-value="amount"]').click();
                    document.getElementById('myShareAmount').value = myOwed.toFixed(2);
                    if (totalVal > 0) {
                        document.getElementById('mySharePercentage').value = (myOwed / totalVal * 100).toFixed(1);
                    }
                }
            }
        } else {
            shareSelector.querySelector('[data-value="equal"]').click();
        }

        // Trigger clear button visibility check
        notesEl.dispatchEvent(new Event('input'));
    }

    document.addEventListener('DOMContentLoaded', () => {
        init();
        if (!tg) document.getElementById('submitBtn').classList.remove('d-none');
        document.getElementById('submitBtn').onclick = sendData;
        
        const notes = document.getElementById('notes');
        const clearBtn = document.getElementById('clearNotes');
        
        const updateClearBtn = () => {
            if (notes.value.length > 0) clearBtn.classList.remove('d-none');
            else clearBtn.classList.add('d-none');
        };
        
        notes.addEventListener('input', updateClearBtn);
        clearBtn.onclick = () => {
            notes.value = '';
            updateClearBtn();
            notes.focus();
        };
    });
</script>
</body>
</html>
